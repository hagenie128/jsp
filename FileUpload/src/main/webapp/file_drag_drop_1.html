<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>파일 업로드 첫번째 방법</title>
<style>
	div.file_drop_area{
		width: 200px;
		height: 200px;
		border: 1px dashed #ccc;
		background-image: url('file.png');
		background-repeat: no-repeat;
		background-position: center center;
	}
	#file{
		display: none;
	}
	ul,li{
		list-style: none;
		padding: 0;
		margin: 0;
	}
	button{
		width: 50px;
		height: 28px;
		margin-top: 10px;
		border: 2px solid #797979;
		background-color: #c7c7c7;
		border-radius: 10px;
		font-size: 14px;
	}
	
</style>
<style>
.file_drop_area {
	width: 200px;
	height: 200px;
	border: 2px dashed #e9e9e9;
	background-image: url('file.png');
	background-repeat: no-repeat;
	background-position: center;
}

#file {
	display: none;
}
.active{
		box-shadow: 0px 0px 3px 5px red;
		background-color: rgba(255,0,0,0.5);
	}
</style>
<script>
	window.onload = () => {
		let file_area = document.querySelector('.file_drop_area');
		let file = document.querySelector('#file');
		
		// 드래그가 파일 영역에 떨어졌을 때
		file_area.ondrop = (e) => {
			e.preventDefault();
			e.target.classList.remove("active");
			console.log(e);
			const data = e.dataTransfer;
			console.log(data);
			console.log(data.files);
			
			file.files = data.files;
			
			const file_list_view = document.querySelector(".file_list_view");
			file_list_view.innerHTML = '';
			for(i=0;i<data.files.length;i++){
				console.log(data.files[i].name);
				file_list_view.innerHTML += data.files[i].name + "<br>"
			}
		}
		// 드래그가 영역 위로 올라왔을 때
		file_area.ondragover = (e) => {
			e.preventDefault();
		}
		// 드래그가 영역 안으로 들어왔을 때
		file_area.ondragenter = (e) => {
			e.preventDefault();
			e.target.classList.add("active");
		}
		// 드래그가 영역 밖으로 나갔을 때
		file_area.ondragleave = (e) => {
			e.preventDefault();
			e.target.classList.remove("active");
		}
		
	}

</script>
</head>
<body>
	<form action="./fileUpload.do" method="post"
		enctype="multipart/form-data">
		<div class="file_drop_area"></div>
		<input type="file" name="file" id="file">
		<button>전송</button>
	</form>

	<hr>
	<div class="file_list_view"></div>
</body>
</html>
