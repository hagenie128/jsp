<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>파일 업로드 첫번째 방법</title>
<style>
	div.file_drop_area{
		width: 200px;
		height: 200px;
		border: 1px dashed #ccc;
		background-image: url('file.png');
		background-repeat: no-repeat;
		background-position: center center;
	}
	#file{
		display: none;
	}
	ul,li{
		list-style: none;
		padding: 0;
		margin: 0;
	}
	button{
		width: 50px;
		height: 28px;
		margin-top: 10px;
		border: 2px solid #797979;
		background-color: #c7c7c7;
		border-radius: 10px;
		font-size: 14px;
	}
	
</style>
<style>
.file_drop_area {
	width: 200px;
	height: 200px;
	border: 2px dashed #e9e9e9;
	background-image: url('file.png');
	background-repeat: no-repeat;
	background-position: center;
}

#file {
	display: none;
}
.active{
		box-shadow: 0px 0px 3px 5px red;
		background-color: rgba(255,0,0,0.5);
	}
</style>
<script>
	window.onload = () => {
		let file_area = document.querySelector('.file_drop_area');
		let file = document.querySelector('#file');
		
		// 드래그가 파일 영역에 떨어졌을 때
		file_area.ondrop = (e) => {
			e.preventDefault();
			e.target.classList.remove("active");
			console.log(e);

			// 드래그된 데이터 가져오기
			const data = e.dataTransfer;
			console.log(data);
			console.log(data.files);
			
			file.files = data.files;
			// 파일 리스트 보여주기
			const file_list_view = document.querySelector(".file_list_view");
			file_list_view.innerHTML = '';
			
			// FormData 객체 생성하기
			const formData = new FormData();
			
			// 파일이 여러개일 수 있기 때문에 반복문으로 처리하기
			for(i=0;i<data.files.length;i++){
				console.log(data.files[i].name);
				formData.append('file',data.files[i]);
				file_list_view.innerHTML += data.files[i].name + "<br>"
			}
			
			// Ajax로 파일 전송하기, 전송 안눌러도 드롭하면 바로 전송되도록
			// 바로 전송 원하지 않으면 전송 버튼 만들어서 클릭했을 때 전송되도록 하면 됨
			fetch('./fileUpload.do',{
				method : 'POST',
				body : formData
			}).then(response => response.json())
			.then(data =>{
				console.log("success : ",data);
			});
			
		}
		// 드래그가 영역 위로 올라왔을 때
		file_area.ondragover = (e) => {
			e.preventDefault();
		}
		// 드래그가 영역 안으로 들어왔을 때
		file_area.ondragenter = (e) => {
			e.preventDefault();
			e.target.classList.add("active");
		}
		// 드래그가 영역 밖으로 나갔을 때
		file_area.ondragleave = (e) => {
			e.preventDefault();
			e.target.classList.remove("active");
		}
		
	}

</script>
</head>
<body>

		<div class="file_drop_area"></div>
		<input type="file" name="file" id="file">
		<button>전송</button>

	<hr>
	<div class="file_list_view"></div>
</body>
</html>
